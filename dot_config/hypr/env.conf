# chezmoi source: dot_config/hypr/env.conf
# chezmoi destination: ~/.config/hypr/env.conf
# Ricer's Log:
# 1. Environment is tuned for Wayland-native behavior before apps spawn.
# 2. Toolkit variables keep GTK, Qt, Electron, and Mozilla visually coherent.
# 3. Cursor and font choices are made globally so apps do not improvise.

env = XCURSOR_SIZE,24 # 24px is readable on HiDPI without feeling oversized.
env = HYPRCURSOR_SIZE,24 # Hyprcursor follows the same visual size.
env = XCURSOR_THEME,Bibata-Modern-Classic # Crisp cursor with dark-theme contrast.
env = HYPRCURSOR_THEME,Bibata-Modern-Classic # Keeps cursor language consistent.

env = GDK_BACKEND,wayland,x11,* # Prefer Wayland while retaining fallback compatibility.
env = QT_QPA_PLATFORM,wayland;xcb # Qt apps should avoid blurry XWayland when possible.
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1 # Client-side Qt chrome clashes with invisible chrome.
env = QT_AUTO_SCREEN_SCALE_FACTOR,1 # Qt respects display scaling.
env = QT_STYLE_OVERRIDE,kvantum # Allows a consistent dark Qt theme if installed.

env = MOZ_ENABLE_WAYLAND,1 # Firefox/Zen render natively on Wayland.
env = ELECTRON_OZONE_PLATFORM_HINT,auto # Electron apps pick Wayland where supported.
env = SDL_VIDEODRIVER,wayland,x11 # SDL games/tools prefer Wayland.
env = CLUTTER_BACKEND,wayland # Legacy Clutter apps avoid XWayland where possible.

env = GTK_THEME,adw-gtk3-dark # GTK apps start in dark mode before settings daemons apply.
env = GTK_USE_PORTAL,1 # File pickers and portals integrate with Wayland.
env = XDG_CURRENT_DESKTOP,Hyprland # Portals route through Hyprland.
env = XDG_SESSION_TYPE,wayland # Toolkits detect the compositor correctly.
env = XDG_SESSION_DESKTOP,Hyprland # Desktop identity for portal choices.

env = WLR_NO_HARDWARE_CURSORS,0 # Hardware cursors are cheaper on working drivers.
env = LIBVA_DRIVER_NAME,nvidia # Safe default for NVIDIA users; override if needed.
env = __GLX_VENDOR_LIBRARY_NAME,nvidia # Helps NVIDIA OpenGL selection.
env = NVD_BACKEND,direct # Better NVIDIA direct scanout path where supported.

# End Ricer's Log:
# - Wayland-first variables are set before autostart apps launch.
# - Dark GTK defaults avoid white flashes during login.
# - NVIDIA hints are included because many Hyprland daily drivers need them.
