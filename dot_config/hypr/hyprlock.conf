# ┌──────────────────────────────────────────────────────────────────────────────┐
# │  velvet noir · hyprlock.conf                                                │
# └──────────────────────────────────────────────────────────────────────────────┘

source = colors.conf

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = ~/.config/hypr/current_wallpaper
    color = $base

    blur_size = 6
    blur_passes = 3
    noise = 0.012
    contrast = 1.2
    brightness = 0.65
    vibrancy = 0.2
}

# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $accent
    font_size = 112
    font_family = Inter Bold
    shadow_passes = 1
    shadow_size = 3
    position = 0, 220
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $text
    font_size = 112
    font_family = Inter Bold
    shadow_passes = 1
    shadow_size = 3
    position = 0, 80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %d %b')" </b>"
    color = $accent2
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 3

    dots_size = 0.24
    dots_spacing = 0.4
    dots_center = true
    rounding = 16

    outer_color = $accent
    inner_color = rgba(13, 13, 15, 0.4)
    font_color = $text
    fade_on_empty = true
    placeholder_text = <i>Password...</i>

    position = 0, 120
    halign = center
    valign = bottom
}
