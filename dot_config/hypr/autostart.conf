# ┌──────────────────────────────────────────────────────────────────────────────┐
# │  velvet noir · autostart.conf                                               │
# └──────────────────────────────────────────────────────────────────────────────┘

# ── Directories ──────────────────────────────────────────────────────────────
exec-once = mkdir -p ~/Pictures/Screenshots

# ── Wallpaper ────────────────────────────────────────────────────────────────
exec-once = awww-daemon & disown

# ── Theme sync ───────────────────────────────────────────────────────────────
exec-once = sleep 0.8 && ~/.config/scripts/theme-switch.sh ~/.config/wallpapers/others/default.jpg

# ── Shell surfaces ───────────────────────────────────────────────────────────
exec-once = waybar
exec-once = swaync

# ── System tray ──────────────────────────────────────────────────────────────
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ── Auth & input ─────────────────────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = fcitx5 -d

# ── Idle & lock ──────────────────────────────────────────────────────────────
exec-once = hypridle
