# ┌──────────────────────────────────────────────────────────────────────────────┐
# │  velvet noir · hyprland.conf                                                │
# │  Managed by chezmoi — dot_config/hypr/hyprland.conf                        │
# └──────────────────────────────────────────────────────────────────────────────┘

# ── Palette fallbacks (overridden by matugen via colors.conf) ────────────────
$base    = rgb(0d0d0f)
$surface = rgb(131316)
$overlay = rgb(1c1c21)
$muted   = rgb(3a3a45)
$subtle  = rgb(6b6b7a)
$text    = rgb(e8e6f0)
$accent  = rgb(b48eff)
$accent2 = rgb(7dd3c8)
$accent3 = rgb(f0a5c0)
$red     = rgb(f28b7d)
$green   = rgb(8ecfb0)
$yellow  = rgb(f5c97a)

# ── Sources (ordered: colors → env → monitors → animations → keybinds → rules)
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/windowrules.conf

# ── General ──────────────────────────────────────────────────────────────────
general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 3
    col.active_border   = $accent $accent2 45deg
    col.inactive_border  = rgba(3a3a4533)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 10
    hover_icon_on_border = false
}

# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding = 14
    rounding_power = 2
    active_opacity   = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range   = 28
        render_power = 3
        color          = rgba(0d0d0fbb)
        color_inactive = rgba(0d0d0f55)
        offset = 0 6
        scale  = 0.97
    }

    blur {
        enabled    = true
        size       = 14
        passes     = 4
        new_optimizations = true
        ignore_opacity    = false
        xray       = false
        noise      = 0.012
        contrast   = 1.1
        brightness = 0.84
        vibrancy   = 0.18
        vibrancy_darkness = 0.24
    }
}

# ── Dwindle ──────────────────────────────────────────────────────────────────
dwindle {
    preserve_split = true
    smart_split    = true
    smart_resizing = true
}

# ── Master ───────────────────────────────────────────────────────────────────
master {
    new_status = master
    new_on_top = true
    mfact = 0.55
}

# ── Misc ─────────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    animate_manual_resizes   = true
    animate_mouse_windowdragging = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    focus_on_activate        = true
    vrr = 1
    close_special_on_empty   = true
    initial_workspace_tracking = 2
}

# ── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout   = us
    follow_mouse = 1
    mouse_refocus = true
    sensitivity  = 0

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        clickfinger_behavior = true
        disable_while_typing = true
        scroll_factor        = 0.32
    }
}

# ── Gestures (Hyprland v0.51.0+ syntax) ──────────────────────────────────────
gesture = 3, horizontal, workspace

# ── Binds ────────────────────────────────────────────────────────────────────
binds {
    workspace_back_and_forth = true
    allow_workspace_cycles   = true
    pass_mouse_when_bound    = false
}

# ── XWayland ─────────────────────────────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}
