# ┌──────────────────────────────────────────────────────────────────────────────┐
# │  velvet noir · windowrules.conf                                             │
# └──────────────────────────────────────────────────────────────────────────────┘

# ── Glass opacity ────────────────────────────────────────────────────────────

windowrule {
    name = kitty-glass
    match:class = ^(kitty)$
    opacity = 0.88 0.82
}

windowrule {
    name = firefox-glass
    match:class = ^(firefox|zen)$
    opacity = 0.97 0.94
}

windowrule {
    name = thunar-glass
    match:class = ^(thunar)$
    opacity = 0.90 0.85
}

windowrule {
    name = vesktop-glass
    match:class = ^(vesktop|discord)$
    opacity = 0.94 0.90
}

windowrule {
    name = code-glass
    match:class = ^(code|Code)$
    opacity = 0.96 0.92
}

# ── Floating dialogs ────────────────────────────────────────────────────────

windowrule {
    name = pavucontrol-float
    match:class = ^(org\.pulseaudio\.pavucontrol)$
    float = true
    center = true
    size = 680 520
}

windowrule {
    name = nmtui-float
    match:class = ^(nmtui-float)$
    float = true
    center = true
    size = 600 400
}

windowrule {
    name = blueman-float
    match:class = ^(blueman-manager)$
    float = true
    center = true
    size = 620 480
}

windowrule {
    name = calc-float
    match:class = ^(org\.gnome\.Calculator)$
    float = true
    center = true
    size = 360 520
}

windowrule {
    name = qt5ct-float
    match:class = ^(qt5ct|qt6ct|nwg-look)$
    float = true
    center = true
}

windowrule {
    name = file-dialog-float
    match:title = ^(Open|Save|File|Choose|Select)
    float = true
    center = true
    size = 900 600
}

windowrule {
    name = picture-in-picture
    match:title = ^(Picture-in-Picture)$
    float = true
    pin = true
    size = 480 270
}

# Tiling is default, no enforcements needed to allow manual floating toggle

# ── Workspace assignments ───────────────────────────────────────────────────

windowrule {
    name = browser-ws
    match:class = ^(firefox|zen|chromium|brave)$
    workspace = 2
}

windowrule {
    name = chat-ws
    match:class = ^(vesktop|discord|telegram)$
    workspace = 3
}

# ── Global rules ────────────────────────────────────────────────────────────

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# ── Rofi Menu Elite Transitions ──────────────────────────────────────────────
windowrule = float 1, match:class = ^(rofi)$
windowrule = pin 1, match:class = ^(rofi)$

layerrule = blur on, match:namespace = rofi
layerrule = animation slide, match:namespace = rofi
