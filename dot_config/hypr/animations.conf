# ┌──────────────────────────────────────────────────────────────────────────────┐
# │  velvet noir · animations.conf                                              │
# └──────────────────────────────────────────────────────────────────────────────┘

animations {
    enabled = true

    # ── Bezier curves (named by feel) ────────────────────────────────────────
    bezier = velvetSnap,   0.16, 1.00, 0.30, 1.06
    bezier = velvetClose,  0.38, 0.00, 0.18, 1.00
    bezier = velvetFlow,   0.22, 1.00, 0.36, 1.00
    bezier = velvetFade,   0.40, 0.00, 0.20, 1.00
    bezier = velvetDrift,  0.25, 0.10, 0.25, 1.00
    bezier = velvetBounce, 0.14, 1.00, 0.34, 1.12
    bezier = velvetLinear, 0.00, 0.00, 1.00, 1.00

    # ── Windows ──────────────────────────────────────────────────────────────
    animation = windows,     1, 3, velvetSnap,   popin 92%
    animation = windowsIn,   1, 3, velvetBounce, popin 86%
    animation = windowsOut,  1, 2, velvetClose,  popin 96%
    animation = windowsMove, 1, 3, velvetFlow

    # ── Layers (Rofi, Waybar, menus) ─────────────────────────────────────────
    animation = layers,    1, 3, velvetDrift, fade
    animation = layersIn,  1, 3, velvetDrift, slide
    animation = layersOut, 1, 2, velvetClose, fade

    # ── Fade ─────────────────────────────────────────────────────────────────
    animation = fade,       1, 2, velvetFade
    animation = fadeIn,     1, 2, velvetFade
    animation = fadeOut,    1, 2, velvetClose
    animation = fadeDim,    1, 3, velvetFade
    animation = fadeSwitch, 1, 2, velvetFade
    animation = fadeShadow, 1, 2, velvetFade

    # ── Border ───────────────────────────────────────────────────────────────
    animation = border,      1, 8,   velvetFlow
    animation = borderangle, 1, 120, velvetLinear, loop

    # ── Workspaces ───────────────────────────────────────────────────────────
    animation = workspaces,        1, 4, velvetFlow,   slide
    animation = specialWorkspace,  1, 3, velvetBounce, slidevert
}
