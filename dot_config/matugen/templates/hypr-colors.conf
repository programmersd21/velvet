# matugen template: hypr/colors.conf
# matugen: this file is generated on wallpaper change

# Hypr expects color tokens without leading '#'
$base    = rgb({{colors.background.dark.hex_stripped}})
$surface = rgb({{colors.surface_container_low.dark.hex_stripped}})
$overlay = rgb({{colors.surface_container.dark.hex_stripped}})
$muted   = rgb({{colors.outline_variant.dark.hex_stripped}})
$subtle  = rgb({{colors.outline.dark.hex_stripped}})
$text    = rgb({{colors.on_background.dark.hex_stripped}})
$accent  = rgb({{colors.primary.dark.hex_stripped}})
$accent2 = rgb({{colors.secondary.dark.hex_stripped}})
$accent3 = rgb({{colors.tertiary.dark.hex_stripped}})
$red     = rgb({{colors.error.dark.hex_stripped}})
$green   = rgb({{colors.primary_container.dark.hex_stripped}})
$yellow  = rgb({{colors.tertiary_container.dark.hex_stripped}})

# Convenience alpha variants (rrggbbaa)
$basecc     = rgba({{colors.background.dark.hex_stripped}}cc)
$muted22    = rgba({{colors.outline_variant.dark.hex_stripped}}22)
$muted55    = rgba({{colors.outline_variant.dark.hex_stripped}}55)
$overlayaa  = rgba({{colors.surface_container.dark.hex_stripped}}aa)
$accentff   = rgba({{colors.primary.dark.hex_stripped}}ff)
$accent2ff  = rgba({{colors.secondary.dark.hex_stripped}}ff)
$accent3ff  = rgba({{colors.tertiary.dark.hex_stripped}}ff)
$textff     = rgba({{colors.on_background.dark.hex_stripped}}ff)
