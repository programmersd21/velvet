# chezmoi source: dot_config/kitty/velvet-theme.conf
# chezmoi destination: ~/.config/kitty/velvet-theme.conf
#
# Ricer's Log:
# 1) 16-color palette is mapped to Velvet Noir so CLI tools look curated by default.
# 2) Selection/cursor are high-contrast but not neon; keeps the "quiet premium" vibe.
# 3) Bright colors are not saturated-toy; they are lifted versions of the same palette.

# Core
background #0d0d0f
foreground #e8e6f0

# Cursor + selection
cursor #b48eff
cursor_text_color #0d0d0f
selection_background #1c1c21
selection_foreground #e8e6f0

# UI hints
url_color #7dd3c8

# 16-color ANSI mapping (Velvet Noir)
# normal
color0  #0d0d0f  # black (base)
color1  #f28b7d  # red
color2  #8ecfb0  # green
color3  #f5c97a  # yellow
color4  #7dd3c8  # blue-ish (teal reads better than pure blue in Velvet Noir)
color5  #b48eff  # magenta (accent violet)
color6  #7dd3c8  # cyan (accent2 teal)
color7  #e8e6f0  # white (text)

# bright
color8  #131316  # bright black (surface)
color9  #f28b7d  # bright red (same: already soft and readable)
color10 #8ecfb0  # bright green
color11 #f5c97a  # bright yellow
color12 #7dd3c8  # bright blue
color13 #b48eff  # bright magenta
color14 #7dd3c8  # bright cyan
color15 #ffffff  # bright white (true white only for rare peak contrast)
