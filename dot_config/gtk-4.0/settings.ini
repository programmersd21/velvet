# chezmoi source: dot_config/gtk-4.0/settings.ini
# chezmoi destination: ~/.config/gtk-4.0/settings.ini

# // Ricer's Log
# // 1. Modern GTK: Ensuring modern GTK4 applications align with the VELVET dark-mode philosophy.

[Settings]
gtk-theme-name=adw-gtk3-dark
gtk-icon-theme-name=Papirus-Dark
gtk-cursor-theme-name=Bibata-Modern-Classic
gtk-font-name=Inter 11
gtk-application-prefer-dark-theme=1
gtk-enable-event-sounds=0
gtk-enable-input-feedback-sounds=0
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
