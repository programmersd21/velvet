name: ✨ Feature Request
description: Propose a new feature, widget, module, or enhancement for Velvet Noir
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Have an idea to make Velvet Noir even better?
        We'd love to hear it! Please provide details about what you want to add.

  - type: textarea
    id: problem-statement
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the issue is (if applicable).
      placeholder: |
        e.g., I'm frustrated when I want to monitor network utilization, but there's no waybar module for it.
    validations:
      required: false

  - type: textarea
    id: proposed-solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen and how it should look or behave.
      placeholder: |
        e.g., Add a custom network speed module in Waybar that uses the dynamic matugen accent colors and slides open on hover.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or workarounds you've explored.
      placeholder: |
        e.g., Writing my own user script, or using an external bar.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context & Visuals
      description: Add any other context, layout mockups, links to other rices, or screenshots.
      placeholder: |
        Attach layout diagrams, sample code snippets, or reference links here.
    validations:
      required: false

  - type: checkboxes
    id: checklists
    attributes:
      label: Validation Checklist
      description: Please verify before submitting.
      options:
        - label: I have searched open/closed issues to make sure this has not been proposed already.
          required: true
