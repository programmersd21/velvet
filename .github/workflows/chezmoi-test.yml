name: Chezmoi Template Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'dot_config/**'
      - 'dot_local/**'
      - 'dot_bashrc'
      - '.chezmoidata.yaml'
      - '.github/workflows/chezmoi-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'dot_config/**'
      - 'dot_local/**'
      - 'dot_bashrc'
      - '.chezmoidata.yaml'
      - '.github/workflows/chezmoi-test.yml'

jobs:
  validate:
    name: Dry-Run Template Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chezmoi
        run: |
          sh -c "$(curl -fsLS https://get.chezmoi.io)" -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize Chezmoi
        run: |
          # Initialize from our checked-out workspace directory
          chezmoi init --source=$GITHUB_WORKSPACE

      - name: Compile and Apply (Dry-Run)
        run: |
          # Perform a dry-run apply to verify all templates compile perfectly
          chezmoi apply --dry-run --verbose
